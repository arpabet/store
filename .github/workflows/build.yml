name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

# Keep go.arpabet.com modules off Google's public module proxy/checksum DB:
# GOPRIVATE expands to GONOPROXY + GONOSUMDB, so these modules are fetched
# directly from source and not cached by proxy.golang.org / sum.golang.org.
env:
  GOPRIVATE: go.arpabet.com/*

jobs:
  build:
    name: build ${{ matrix.module }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { module: ., testflags: "-race -cover" }                 # interface (go.arpabet.com/store)
          - { module: storetest, testflags: "-race -cover" }         # conformance + benchmark harness
          # benchmarks imports every provider (incl. boltdb/bolt, whose unsafe
          # pointer math trips -race/checkptr), and has no Test funcs to run —
          # so this just compile-checks the suite. Runs without -race.
          - { module: benchmarks, testflags: "-cover" }
          - { module: providers/badger, testflags: "-race -cover" }
          - { module: providers/bbolt, testflags: "-race -cover" }
          # boltdb/bolt (archived) does unsafe pointer arithmetic that
          # trips -race/checkptr on modern Go, so it runs without -race.
          - { module: providers/bolt, testflags: "-cover" }
          - { module: providers/mem, testflags: "-race -cover" }
          - { module: providers/nutsdb, testflags: "-race -cover" }
          - { module: providers/pebble, testflags: "-race -cover" }
          - { module: providers/rosedb, testflags: "-race -cover" }
          - { module: middleware/crypto, testflags: "-race -cover" }
          - { module: middleware/crypto/age, testflags: "-race -cover" }
          - { module: middleware/crypto/kms/aws, testflags: "-race -cover" }
          - { module: middleware/crypto/kms/gcp, testflags: "-race -cover" }
          - { module: middleware/compress, testflags: "-race -cover" }
          - { module: middleware/otel, testflags: "-race -cover" }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: |
            go.work.sum
            **/go.sum

      - name: Build
        working-directory: ${{ matrix.module }}
        run: go build -v ./...

      - name: Vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      - name: Test
        working-directory: ${{ matrix.module }}
        run: go test ${{ matrix.testflags }} ./...
